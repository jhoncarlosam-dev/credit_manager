{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <div class="alert alert-danger">
        <h2>¿Eliminar cliente?</h2>
        <p>¿Estás seguro de eliminar a <strong>{{ client.full_name }}</strong>? Esta acción no se puede deshacer.</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Sí, eliminar</button>
            <a href="{% url 'clients:client_list' %}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
